<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketify — Realtime Ticketing</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing-page">
  <header>
    <a href="index.html" class="logo logo-link">Ticketify</a>
    <nav class="landing-nav">
      <a href="login.html" data-nav-guest>Login</a>
      <a href="register.html" data-nav-guest>Register</a>
      <a href="dashboard.html" class="btn btn-small landing-nav-cta" data-nav-auth hidden>Dashboard</a>
      <a href="#" id="logout-btn" data-nav-auth hidden>Logout</a>
    </nav>
  </header>

  <main class="container landing-shell">
    <section class="landing-left">
      <p class="landing-brand">TICKETIFY</p>
      <h1>Realtime Ticketing<br><span class="hero-nowrap">For Modern Events</span></h1>
      <p class="home-tagline">
        Secure realtime ticketing with QR validation and live event infrastructure.
      </p>

      <div class="home-actions">
        <a href="register.html" class="btn">Get Started</a>
        <a href="events.html" class="btn btn-outline">Explore Events</a>
      </div>
    </section>

    <section class="landing-right" aria-label="Ticketify product preview">
      <article class="mock-panel pass-spotlight">
        <p class="mock-title"><i data-lucide="ticket" class="icon-inline"></i> Ticketify Digital Pass</p>
        <div class="ticket-pass">
          <div>
            <p class="mock-meta">Ticket Code</p>
            <strong>TICKET-4F9Q2P1A</strong><br>
            <span class="pass-event">Realtime Summit 2026</span>
          </div>
          <div class="mock-qr"><i data-lucide="qr-code" class="icon-inline"></i></div>
        </div>
        <p class="mock-badge"><i data-lucide="radio" class="icon-inline"></i> Live updates enabled</p>
      </article>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
