<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Ticketify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-page">
  <header>
    <a href="index.html" class="logo logo-link">Ticketify</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html" data-nav-dashboard hidden>Dashboard</a>
      <a href="login.html" data-nav-guest>Login</a>
      <a href="events.html" data-nav-auth hidden>Events</a>
      <a href="tickets.html" data-nav-auth hidden>My Tickets</a>
      <a href="#" id="logout-btn" data-nav-auth hidden>Logout</a>
    </nav>
  </header>

  <main class="container register-shell">
    <section class="auth-card register-card-wrap">
      <p class="register-kicker">TICKETIFY</p>
      <h1>Create account</h1>
      <p class="auth-hint">Create your user account to access events and bookings.</p>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-block">Register</button>
        <p id="register-success" class="status-msg" hidden></p>
        <p id="register-error" class="status-msg" hidden></p>
      </form>
      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
