<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Ticketify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="home.html" class="logo logo-link">Ticketify</a>
    <nav>
      <a href="home.html">Home</a>
      <a href="login.html" data-nav-guest>Login</a>
      <a href="index.html" data-nav-auth hidden>Events</a>
      <a href="#" id="logout-btn" data-nav-auth hidden>Logout</a>
    </nav>
  </header>

  <main class="container">
    <div class="auth-card">
      <h1>Create account</h1>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role">
            <option value="user">user</option>
            <option value="organizer">organizer</option>
          </select>
        </div>
        <button type="submit" class="btn btn-block">Register</button>
        <p id="register-success" class="status-msg" hidden></p>
        <p id="register-error" class="status-msg" hidden></p>
      </form>
      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
