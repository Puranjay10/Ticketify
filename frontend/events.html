<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Ticketify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="dashboard.html" class="logo logo-link">Ticketify</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html" data-nav-dashboard hidden>Dashboard</a>
      <a href="events.html">Events</a>
      <a href="tickets.html" data-nav-auth hidden>My Tickets</a>
