<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ticketify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="home.html" class="logo logo-link">Ticketify</a>
    <nav>
      <a href="home.html">Home</a>
      <a href="register.html" data-nav-guest>Register</a>
      <a href="index.html" data-nav-auth hidden>Events</a>
      <a href="#" id="logout-btn" data-nav-auth hidden>Logout</a>
    </nav>
  </header>

  <main class="container">
    <div class="auth-card">
      <h1>Log in</h1>
      <p class="auth-hint">Email and password only — your role is set by the server.</p>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-block">Login</button>
        <p id="login-error" class="status-msg" hidden></p>
      </form>
      <p class="auth-footer">
        No account? <a href="register.html">Register</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
